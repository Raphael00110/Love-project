<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decryption Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CRT scanline overlay -->
    <div id="scanline"></div>

    <!-- Hidden input keeps mobile keyboard alive -->
    <input id="mobileInput" type="text" autocomplete="off" autocorrect="off"
           autocapitalize="off" spellcheck="false"
           style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;z-index:-1;">

    <!-- Fullscreen Cinematic Viewport -->
    <div id="videoContainer" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:9999; overflow:hidden; opacity:0; transition:opacity 1.5s ease;">

        <!-- YT.Player replaces this div with its own iframe (styled in JS onReady).
             pointer-events:none is applied via JS after the iframe is created. -->
        <div id="cinematicFrame" style="position:absolute;top:0;left:0;width:100%;height:100%;"></div>

        <!-- Cinematic vignette — darkens edges like a movie lens -->
        <div style="position:absolute;inset:0;
                    background:radial-gradient(ellipse at 50% 50%, transparent 52%, rgba(0,0,0,0.68) 100%);
                    z-index:2; pointer-events:none;"></div>

        <!-- Skip button — fixed so it layers above the iframe on mobile;
             fades in after 4 s so the opening isn't interrupted -->
        <button id="videoPlayBtn"
            style="position:fixed; bottom:32px; right:20px;
                   z-index:10000;
                   background:rgba(0,0,0,0.55);
                   color:rgba(255,255,255,0.9);
                   border:1px solid rgba(255,255,255,0.35);
                   padding:11px 22px;
                   font-family:'Courier New',monospace;
                   font-size:0.72rem; letter-spacing:3px;
                   text-transform:uppercase; cursor:pointer;
                   border-radius:2px;
                   backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
                   box-shadow:0 2px 20px rgba(0,0,0,0.7);
                   opacity:0; transition:opacity 0.8s ease;
                   -webkit-tap-highlight-color:transparent;">
            SKIP ❯
        </button>
    </div>

    <!-- Media Vault Pop-up -->
    <div id="mediaVaultOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.95); z-index:9998; justify-content:center; align-items:center; box-sizing:border-box; padding:20px; opacity:0; transition:opacity 0.5s ease;">
        <div style="display:flex; flex-direction:column; align-items:center; max-width:90%; max-height:90%;">
            <img id="vaultImage" src="" alt="Decrypted Vault Asset" style="max-width:100%; max-height:70vh; border:3px solid #ffffff; box-shadow:0 0 20px rgba(255,255,255,0.3); border-radius:4px; object-fit:contain; margin-bottom:20px;">
            <div style="display:flex; gap:20px;">
                <button id="vaultDownloadBtn" style="display:none; background:transparent; color:#ffffff; border:2px solid #ffffff; padding:10px 20px; font-family:monospace; font-size:1rem; cursor:pointer; text-transform:uppercase; box-shadow:0 0 10px rgba(255,255,255,0.2);">
                    💾 Download
                </button>
                <button id="vaultCloseBtn" style="background:transparent; color:#ff3333; border:2px solid #ff3333; padding:10px 20px; font-family:monospace; font-size:1rem; cursor:pointer; text-transform:uppercase; box-shadow:0 0 10px rgba(255,51,51,0.2);">
                    ✕ Close Asset
                </button>
            </div>
        </div>
    </div>

    <!-- Story Letter Screen -->
    <div id="loveLetterScreen" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:black; color:#ffffff; font-family:monospace; z-index:9997; justify-content:center; align-items:center; padding:40px; box-sizing:border-box; overflow-y:auto; opacity:1;">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; max-width:700px; width:100%;">
            <div id="letterContent" style="width:100%; display:flex; flex-direction:column; gap:24px; font-size:1.25rem; line-height:1.8; text-shadow:0 0 8px rgba(255,255,255,0.4); text-align:center;"></div>
        </div>
    </div>

    <!-- Matrix rain -->
    <canvas id="matrix"></canvas>

    <h1 id="mainTitle">SECURITY ACCESS REQUIRED</h1>


    <div id="terminalApp" class="terminal">
        <div id="output">
            <p>SYSTEM STATUS: STANDBY</p>
            <p>AWAITING OPERATOR INITIALIZATION...</p>
        </div>
        <div id="controlPanel">
            <button id="startBtn">INITIALIZE DECRYPTION</button>
        </div>
    </div>

    <script src="app.js"></script>

    <!-- Pre-load the YouTube IFrame API. Exposes window._ytReady (a Promise)
         so startCinematicSequence can await it instead of polling. -->
    <script>
        window._ytReady = new Promise(function(resolve) {
            window.onYouTubeIframeAPIReady = resolve;
        });
        (function() {
            var s = document.createElement('script');
            s.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(s);
        })();
    </script>
</body>
</html>
